    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Image Alt Text", name: "image_alt", widget: "string", required: false }
      - { label: "Type", name: "type", widget: "hidden", default: "external" }
      - { label: "Category", name: "category", widget: "hidden", default: "Screenshots" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ", default: "{{now}}" }
      - { label: "Caption", name: "body", widget: "markdown", required: false }

