    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "string", hint: "URL or path" }
      - { label: "Image Alt Text", name: "image_alt", widget: "string", required: false }
      - { label: "Type", name: "type", widget: "select", options: ["external", "cover"], default: "external" }
      - { label: "Category", name: "category", widget: "hidden", default: "Artemis II" }
      - { label: "Labels", name: "labels", widget: "list", default: [], required: false }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ", default: "{{now}}" }
      - { label: "Caption", name: "body", widget: "markdown", required: false }
      - { label: "Link", name: "link", widget: "string", required: false }

  - name: "artemis_mission_science"
    label: "Mission Science [Artemis II]"
    folder: "_gallery/artemis-ii/artemis-ii-mission-science"
    media_folder: "../../../../assets/images/artemis-ii/artemis-ii-mission-science"
    public_folder: "/assets/images/artemis-ii/artemis-ii-mission-science"
    create: true
    slug: "{{slug}}"
