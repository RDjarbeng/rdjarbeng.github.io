singletons:

  - name: "config"
    label: "config"
    file: "admin/config-b.yml"
    editor:
      preview: false
    fields:
      - name: "collections"
        label: "collections"
        widget: list
        fields:
          - { label: "name", name: "name", widget: "string" }
          - { label: "label", name: "label", widget: "string" }
          - label: "slug"
            name: "slug"
            widget: "string"
            hint: "Define filename format. Examples: '{{year}}-{{month}}-{{day}}-{{slug}}' for posts, '{{slug}}' for simple collections. Leave blank for file-based collections."
            required: false
          - label: "ability to create entry"
            name: "create"
            widget: boolean

          - label: "folder"
            name: "folder"
            widget: "string"
            required: false
          - label: "media_folder"
            name: "media_folder"
            widget: "string"
            required: false
          - label: "public_folder"
            name: "public_folder"
            widget: "string"
            required: false
          - label: "files"
            name: "files"
            widget: "list"
            required: false
            fields:
              - { label: "name", name: "name", widget: "string" }
              - { label: "label", name: "label", widget: "string" }
              - { label: "file", name: "file", widget: "string" }
              - {
                  label: "create",
                  name: "create",
                  widget: "boolean",
                  default: false,
                  required: false,
                }
              - label: "fields"
                name: "fields"
                widget: "list"
                fields:
                  - { label: "name", name: "name", widget: "string" }
                  - { label: "label", name: "label", widget: "string" }
                  - { label: "widget", name: "widget", widget: "string" }

          - label: "fields"
            name: "fields"
            widget: "list"
            fields:
              - { label: "name", name: "name", widget: "string" }
              - { label: "label", name: "label", widget: "string" }
              - { label: "widget", name: "widget", widget: "string" }
