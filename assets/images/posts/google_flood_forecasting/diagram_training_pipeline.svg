<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="660" viewBox="0 0 680 660" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .label-title { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .label-sub   { font-size: 12px; font-weight: 400; fill: #555; }
      .label-note  { font-size: 12px; font-weight: 400; fill: #888; }
      .box-gray    { fill: #f1efe8; stroke: #5f5e5a; }
      .box-purple  { fill: #eeedfe; stroke: #534ab7; }
      .box-teal    { fill: #e1f5ee; stroke: #0f6e56; }
      .box-blue    { fill: #e6f1fb; stroke: #185fa5; }
      .box-coral   { fill: #faece7; stroke: #993c1d; }
      .connector   { fill: none; stroke: #888; stroke-width: 1; stroke-linecap: round; }
      .divider     { stroke: #ccc; stroke-width: 0.5; stroke-dasharray: 4 4; }
    </style>
  </defs>

  <rect width="680" height="660" fill="white"/>

  <!-- Phase label: training -->
  <text class="label-note" x="340" y="28" text-anchor="middle" dominant-baseline="central">Training phase — done once</text>
  <line class="divider" x1="60" y1="38" x2="620" y2="38"/>

  <!-- News articles -->
  <rect class="box-gray" x="190" y="50" width="300" height="56" rx="8" stroke-width="0.5"/>
  <text class="label-title" x="340" y="72" text-anchor="middle" dominant-baseline="central">5 million news articles</text>
  <text class="label-sub" x="340" y="90" text-anchor="middle" dominant-baseline="central">80 languages, 2000 to present</text>
  <line class="connector" x1="340" y1="106" x2="340" y2="136" marker-end="url(#arrow)"/>

  <!-- Gemini extraction -->
  <rect class="box-purple" x="190" y="136" width="300" height="56" rx="8" stroke-width="0.5"/>
  <text class="label-title" x="340" y="158" text-anchor="middle" dominant-baseline="central">Gemini extraction</text>
  <text class="label-sub" x="340" y="176" text-anchor="middle" dominant-baseline="central">Classify, date, geolocate events</text>
  <line class="connector" x1="340" y1="192" x2="340" y2="222" marker-end="url(#arrow)"/>

  <!-- Groundsource dataset -->
  <rect class="box-teal" x="190" y="222" width="300" height="56" rx="8" stroke-width="0.5"/>
  <text class="label-title" x="340" y="244" text-anchor="middle" dominant-baseline="central">Groundsource dataset</text>
  <text class="label-sub" x="340" y="262" text-anchor="middle" dominant-baseline="central">2.6M events, 150+ countries</text>

  <!-- Groundsource feeds into model (left branch) -->
  <path class="connector" d="M 280 278 L 280 318 L 220 318 L 220 358" marker-end="url(#arrow)"/>

  <!-- Historical weather (right) -->
  <rect class="box-blue" x="400" y="288" width="220" height="56" rx="8" stroke-width="0.5"/>
  <text class="label-title" x="510" y="310" text-anchor="middle" dominant-baseline="central">Historical weather data</text>
  <text class="label-sub" x="510" y="328" text-anchor="middle" dominant-baseline="central">Rainfall, soil, topography</text>
  <line class="connector" x1="510" y1="344" x2="510" y2="404"/>
  <path class="connector" d="M 510 404 L 400 404" marker-end="url(#arrow)"/>

  <!-- LSTM model training -->
  <rect class="box-purple" x="190" y="358" width="200" height="56" rx="8" stroke-width="0.5"/>
  <text class="label-title" x="290" y="380" text-anchor="middle" dominant-baseline="central">LSTM model training</text>
  <text class="label-sub" x="290" y="398" text-anchor="middle" dominant-baseline="central">Learns flood patterns</text>

  <!-- Phase divider: inference -->
  <line class="divider" x1="60" y1="438" x2="620" y2="438"/>
  <text class="label-note" x="340" y="452" text-anchor="middle" dominant-baseline="central">Inference phase — runs daily on live weather</text>

  <!-- Arrow from model down -->
  <line class="connector" x1="290" y1="414" x2="290" y2="466" marker-end="url(#arrow)"/>

  <!-- Live weather -->
  <rect class="box-blue" x="400" y="466" width="220" height="56" rx="8" stroke-width="0.5"/>
  <text class="label-title" x="510" y="488" text-anchor="middle" dominant-baseline="central">Live weather forecasts</text>
  <text class="label-sub" x="510" y="506" text-anchor="middle" dominant-baseline="central">ECMWF, NASA, NOAA</text>

  <!-- Trained model box -->
  <rect class="box-purple" x="140" y="466" width="220" height="56" rx="8" stroke-width="0.5"/>
  <text class="label-title" x="250" y="488" text-anchor="middle" dominant-baseline="central">Trained model</text>
  <text class="label-sub" x="250" y="506" text-anchor="middle" dominant-baseline="central">Matches pattern to history</text>
  <line class="connector" x1="400" y1="494" x2="360" y2="494" marker-end="url(#arrow)"/>

  <!-- Model to alert -->
  <line class="connector" x1="250" y1="522" x2="250" y2="552" marker-end="url(#arrow)"/>

  <!-- Flash flood alert -->
  <rect class="box-coral" x="140" y="552" width="220" height="56" rx="8" stroke-width="0.5"/>
  <text class="label-title" x="250" y="574" text-anchor="middle" dominant-baseline="central">Flash flood alert</text>
  <text class="label-sub" x="250" y="592" text-anchor="middle" dominant-baseline="central">Up to 24 hours ahead</text>

  <!-- Footer note -->
  <text class="label-note" x="340" y="638" text-anchor="middle" dominant-baseline="central">Groundsource is training data — the model does not re-read news to forecast.</text>
</svg>
